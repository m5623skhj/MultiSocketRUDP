name: Native PR CI - GTest

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: windows-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout (with private submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_ACCESS_TOKEN }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet
        run: nuget restore MultiSocketRUDP/MultiSocketRUDP.sln

      - name: Build GTest (x64 Debug)
        shell: pwsh
        run: |
          $GTestRoot = "${{ github.workspace }}/MultiSocketRUDP/external/CommonCode/Common/googletest-main/googletest"
          $BuildDir = "$GTestRoot/build"
          New-Item -ItemType Directory -Force -Path $BuildDir
          Push-Location $BuildDir
          cmake .. -A x64 -DCMAKE_BUILD_TYPE=Debug
          cmake --build . --config Debug
          Pop-Location

      - name: Build Solution (x64 Debug)
        run: msbuild MultiSocketRUDP/MultiSocketRUDP.sln /m /p:Configuration=Debug /p:Platform=x64

      - name: Run GTests with Retry
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          $failedTests = @()
          $finalFailed = @()

          function Parse-XmlFailures($xmlPath, [ref]$failedList) {
              if (!(Test-Path $xmlPath)) { return }
              try { [xml]$xml = Get-Content $xmlPath } catch { return }

              if ($xml.testsuites -and $xml.testsuites.testsuite) {
                  foreach ($suite in @($xml.testsuites.testsuite)) {
                      foreach ($test in @($suite.testcase)) {
                          if ($test.failure) {
                              $failedList.Value += $test
                          }
                      }
                  }
              }
          }

          Get-ChildItem -Recurse -Filter "*Test.exe" |
          Where-Object { $_.FullName -match "Debug" } |
          ForEach-Object {
              $exePath = $_.FullName
              $xmlPath = "$($_.DirectoryName)\test_result.xml"
              & $exePath --gtest_output=xml:$xmlPath

              $temp = @()
              Parse-XmlFailures $xmlPath ([ref]$temp)
              foreach ($t in $temp) {
                  $failedTests += "$($t.classname).$($t.name)"
              }
          }

          if ($failedTests.Count -gt 0) {
              $filter = $failedTests -join ":"

              Get-ChildItem -Recurse -Filter "*Test.exe" |
              Where-Object { $_.FullName -match "Debug" } |
              ForEach-Object {
                  $exePath = $_.FullName
                  $retryXml = "$($_.DirectoryName)\retry_result.xml"
                  & $exePath --gtest_filter=$filter --gtest_output=xml:$retryXml
                  Parse-XmlFailures $retryXml ([ref]$finalFailed)
              }
          }

          $summary = "<!-- GTEST_SUMMARY_MARKER -->`n"
          $summary += "## 🧪 Native GTest Result (with retry)`n`n"

          if ($finalFailed.Count -eq 0 -and $failedTests.Count -eq 0) {
              $summary += "✅ All tests passed`n"
          }
          elseif ($finalFailed.Count -eq 0) {
              $summary += "⚠️ Flaky tests detected but passed on retry:`n"
              foreach ($t in $failedTests) {
                  $summary += "- $t`n"
              }
          }
          else {
              foreach ($t in $finalFailed) {
                  $summary += "### ❌ $($t.name)`n"
                  $summary += "```"
                  $summary += "`n"
                  if ($t.failure.message) { $summary += $t.failure.message + "`n" }
                  if ($t.failure.'#text') { $summary += $t.failure.'#text' + "`n" }
                  $summary += "```"
                  $summary += "`n---`n"
              }
              $summary += "`n**Total Final Failed: $($finalFailed.Count)**"
          }

          $summary | Out-File -FilePath test_summary.txt -Encoding utf8

          if ($finalFailed.Count -gt 0) {
              exit 1
          }

      - name: Upsert PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- GTEST_SUMMARY_MARKER -->';

            let body;

            if (fs.existsSync('test_summary.txt')) {
              body = fs.readFileSync('test_summary.txt', 'utf8');
            } else {
              body = marker + "\n## 🧪 Native GTest Result\n\n❌ Test execution failed before summary generation.";
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
