name: Native GTest

on:
  workflow_call:
    secrets:
      SUBMODULE_ACCESS_TOKEN:
        required: false

jobs:
  build-and-test:
    runs-on: windows-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout (with private submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_ACCESS_TOKEN || github.token }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet
        run: nuget restore MultiSocketRUDP/MultiSocketRUDP.sln

      - name: Generate IntegrationTest certificate
        shell: cmd
        run: MultiSocketRUDP\Tool\ForTLS\CreateDevTLSPfx.bat

      - name: Cache GTest build
        id: cache-gtest
        uses: actions/cache@v4
        with:
          path: external/CommonCode/Common/googletest-main/build
          key: gtest-${{ runner.os }}-${{ hashFiles('.gitmodules') }}

      - name: Build GTest
        if: steps.cache-gtest.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $gtestActualRoot = Get-ChildItem -Recurse -Directory -Filter "googletest-main" |
                             Where-Object { Test-Path "$($_.FullName)/CMakeLists.txt" } |
                             Select-Object -First 1 -ExpandProperty FullName

          if (-not $gtestActualRoot) {
              Write-Error "Could not find googletest-main with CMakeLists.txt"
              exit 1
          }

          Write-Host "Found GTest at: $gtestActualRoot"

          $gtestBuild = Join-Path $gtestActualRoot "build"
          if (!(Test-Path $gtestBuild)) {
              New-Item -ItemType Directory -Path $gtestBuild | Out-Null
          }

          cmake -S $gtestActualRoot -B $gtestBuild -A x64 -T v143 -DCMAKE_BUILD_TYPE=Debug
          cmake --build $gtestBuild --config Debug

      - name: Build Solution (x64 Debug)
        run: msbuild MultiSocketRUDP/MultiSocketRUDP.sln /m /p:Configuration=Debug /p:Platform=x64

      - name: Run native GTests with Retry
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          $failedTests = @()
          $finalFailed = @()
          $crashedRuns = @()

          function Parse-XmlFailures($xmlPath, [ref]$failedList) {
              if (!(Test-Path $xmlPath)) { return $false }
              try { [xml]$xml = Get-Content $xmlPath -Raw -ErrorAction Stop } catch { return $false }

              if ($xml.testsuites -and $xml.testsuites.testsuite) {
                  foreach ($suite in @($xml.testsuites.testsuite)) {
                      foreach ($test in @($suite.testcase)) {
                          if ($test.failure) {
                              $failedList.Value += $test
                          }
                      }
                  }
              }
              return $true
          }

          $gtestExecutables = @(Get-ChildItem -Recurse -Filter "*Test.exe" |
            Where-Object {
              $_.Name -in @("CoreTest.exe", "IntegrationTest.exe") -and
              $_.FullName -match "x64\\Debug"
            })

          if ($gtestExecutables.Count -ne 2) {
              $crashedRuns += "Expected 2 native GTest executables, found $($gtestExecutables.Count)"
          }

          foreach ($testExecutable in $gtestExecutables) {
              $exePath = $testExecutable.FullName
              $xmlPath = Join-Path $testExecutable.DirectoryName "$($testExecutable.BaseName)_test_result.xml"
              Remove-Item $xmlPath -Force -ErrorAction SilentlyContinue

              & $exePath --gtest_output=xml:$xmlPath
              $exeExitCode = $LASTEXITCODE

              $temp = @()
              $xmlValid = Parse-XmlFailures $xmlPath ([ref]$temp)
              if (-not $xmlValid -or $exeExitCode -notin @(0, 1) -or ($exeExitCode -ne 0 -and $temp.Count -eq 0)) {
                  $crashedRuns += "$($testExecutable.Name) (exit=$exeExitCode, valid result XML=$xmlValid)"
              }

              foreach ($t in $temp) {
                  $failedTests += "$($t.classname).$($t.name)"
              }
          }

          if ($failedTests.Count -gt 0) {
              $filter = $failedTests -join ":"

              foreach ($testExecutable in $gtestExecutables) {
                  $exePath = $testExecutable.FullName
                  $retryXml = Join-Path $testExecutable.DirectoryName "$($testExecutable.BaseName)_retry_result.xml"
                  Remove-Item $retryXml -Force -ErrorAction SilentlyContinue

                  & $exePath --gtest_filter=$filter --gtest_output=xml:$retryXml
                  $retryExitCode = $LASTEXITCODE

                  $retryFailures = @()
                  $retryXmlValid = Parse-XmlFailures $retryXml ([ref]$retryFailures)
                  if (-not $retryXmlValid -or $retryExitCode -notin @(0, 1) -or ($retryExitCode -ne 0 -and $retryFailures.Count -eq 0)) {
                      $crashedRuns += "$($testExecutable.Name) retry (exit=$retryExitCode, valid result XML=$retryXmlValid)"
                  }

                  $finalFailed += $retryFailures
              }
          }

          $summary = @"
          <!-- GTEST_SUMMARY_MARKER -->
          ## 🧪 Native GTest Result (with retry)
          
          "@

          if ($crashedRuns.Count -gt 0) {
            $summary += "Test process crashed (no result XML):`r`n"
            foreach ($c in $crashedRuns) {
              $summary += "- $c`r`n"
            }
          }
          elseif ($finalFailed.Count -eq 0 -and $failedTests.Count -eq 0) {
              $summary += "All tests passed.`r`n"
          }
          elseif ($finalFailed.Count -eq 0) {
              $summary += "Flaky tests detected but passed on retry:`r`n"
              foreach ($t in $failedTests) {
                  $summary += "- $t`r`n"
              }
          }
          else {
              foreach ($t in $finalFailed) {
                  $summary += "FAILED: $($t.name)`r`n"
                  if ($t.failure.message) { $summary += $t.failure.message + "`r`n" }
                  if ($t.failure.'#text') { $summary += $t.failure.'#text' + "`r`n" }
                  $summary += "`r`n"
              }
              $summary += "Total Final Failed: $($finalFailed.Count)"
          }

          $summary | Out-File -FilePath test_summary.txt -Encoding utf8

          if ($finalFailed.Count -gt 0 -or $crashedRuns.Count -gt 0) {
              exit 1
          }

      - name: Upsert PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- GTEST_SUMMARY_MARKER -->';

            let body;

            if (fs.existsSync('test_summary.txt')) {
              body = fs.readFileSync('test_summary.txt', 'utf8');
            } else {
              body = marker + "\nTest execution failed before summary generation.";
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Install OpenCppCoverage
        if: always()
        run: choco install opencppcoverage -y

      - name: Measure CoreTest coverage
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $occ = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
          if (-not (Test-Path $occ)) { Write-Error "OpenCppCoverage not found at $occ"; exit 1 }

          $exe = Get-ChildItem -Recurse -Filter "CoreTest.exe" |
                Where-Object { $_.FullName -match "x64\\Debug" } |
                Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { Write-Error "CoreTest.exe not found"; exit 1 }

          & $occ --modules CoreTest.exe --sources MultiSocketRUDPServer --sources Common --excluded_sources CommonCode --excluded_sources CoreTest --excluded_sources googletest --export_type cobertura:coverage.xml --export_type html:CoverageReport -- $exe

          [xml]$c = Get-Content coverage.xml
          $pct = [math]::Round([double]$c.coverage.'line-rate' * 100, 2)
          $covered = $c.coverage.'lines-covered'
          $valid = $c.coverage.'lines-valid'
          @(
            '<!-- COVERAGE_SUMMARY_MARKER -->',
            '## 📊 CoreTest Line Coverage',
            "**$pct%**  ($covered / $valid lines)"
          ) | Out-File coverage_summary.txt -Encoding utf8

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Upsert Coverage PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- COVERAGE_SUMMARY_MARKER -->';
            if (!fs.existsSync('coverage_summary.txt')) return;
            const body = fs.readFileSync('coverage_summary.txt', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
