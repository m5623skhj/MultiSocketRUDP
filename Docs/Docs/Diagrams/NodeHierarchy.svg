<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="860" height="460" fill="#0f172a" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">노드 타입 계층 구조</text>

  <!-- Root -->
  <rect x="330" y="55" width="200" height="44" rx="8" fill="#374151" stroke="#6b7280" stroke-width="2"/>
  <text x="430" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#f9fafb">ActionNodeBase</text>
  <text x="430" y="89" text-anchor="middle" font-size="9" fill="#9ca3af">Name · Trigger · NextNodes · Execute()</text>

  <!-- ContextNodeBase -->
  <rect x="295" y="130" width="270" height="44" rx="8" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
  <text x="430" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#d1d5db">ContextNodeBase</text>
  <text x="430" y="163" text-anchor="middle" font-size="9" fill="#6b7280">Execute() → SetPacket() → ExecuteImpl()</text>

  <!-- Arrows from base -->
  <line x1="430" y1="99" x2="430" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Action nodes (direct from base) -->
  <!-- SendPacketNode -->
  <rect x="20" y="215" width="140" height="52" rx="6" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
  <text x="90" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">SendPacketNode</text>
  <text x="90" y="248" text-anchor="middle" font-size="8" fill="#9ca3af">PacketId</text>
  <text x="90" y="260" text-anchor="middle" font-size="8" fill="#9ca3af">PacketBuilder</text>

  <!-- DelayNode -->
  <rect x="170" y="215" width="130" height="52" rx="6" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
  <text x="235" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">DelayNode</text>
  <text x="235" y="248" text-anchor="middle" font-size="8" fill="#9ca3af">DelayMs</text>
  <text x="235" y="260" text-anchor="middle" font-size="8" fill="#9ca3af">async Task.Run</text>

  <!-- RandomDelayNode -->
  <rect x="310" y="215" width="140" height="52" rx="6" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
  <text x="380" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">RandomDelayNode</text>
  <text x="380" y="248" text-anchor="middle" font-size="8" fill="#9ca3af">Min / Max Ms</text>
  <text x="380" y="260" text-anchor="middle" font-size="8" fill="#9ca3af">async Task.Run</text>

  <!-- RandomChoiceNode -->
  <rect x="460" y="215" width="150" height="52" rx="6" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
  <text x="535" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">RandomChoiceNode</text>
  <text x="535" y="248" text-anchor="middle" font-size="8" fill="#9ca3af">Choices[] + Weight</text>
  <text x="535" y="260" text-anchor="middle" font-size="8" fill="#9ca3af">가중치 무작위 선택</text>

  <!-- CustomActionNode -->
  <rect x="620" y="215" width="140" height="52" rx="6" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
  <text x="690" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CustomActionNode</text>
  <text x="690" y="248" text-anchor="middle" font-size="8" fill="#9ca3af">ActionHandler 람다</text>
  <text x="690" y="260" text-anchor="middle" font-size="8" fill="#9ca3af">코드 직접 주입</text>

  <!-- Direct from base arrows -->
  <line x1="430" y1="99" x2="90" y2="213" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="99" x2="235" y2="213" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="99" x2="380" y2="213" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="99" x2="535" y2="213" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="99" x2="690" y2="213" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- ContextNodeBase children -->
  <!-- Condition (DarkOrange) -->
  <rect x="20" y="330" width="155" height="100" rx="6" fill="#92400e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="97" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">ConditionalNode</text>
  <text x="97" y="366" text-anchor="middle" font-size="8" fill="#fde68a">Condition(ctx) → bool</text>
  <text x="97" y="380" text-anchor="middle" font-size="8" fill="#fde68a">TrueNodes / FalseNodes</text>
  <text x="97" y="394" text-anchor="middle" font-size="8" fill="#fde68a">→ NextNodes 실행</text>
  <rect x="27" y="406" width="141" height="18" rx="3" fill="#78350f"/>
  <text x="97" y="419" text-anchor="middle" font-size="8" fill="#fbbf24">카테고리: Condition 🟠</text>

  <!-- Loop nodes (DarkMagenta) -->
  <rect x="185" y="330" width="140" height="100" rx="6" fill="#4a1d96" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="255" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">LoopNode</text>
  <text x="255" y="366" text-anchor="middle" font-size="8" fill="#ddd6fe">ContinueCondition</text>
  <text x="255" y="380" text-anchor="middle" font-size="8" fill="#ddd6fe">LoopBody / ExitNodes</text>
  <text x="255" y="394" text-anchor="middle" font-size="8" fill="#ddd6fe">MaxIterations 안전장치</text>
  <rect x="192" y="406" width="126" height="18" rx="3" fill="#3b1576"/>
  <text x="255" y="419" text-anchor="middle" font-size="8" fill="#a78bfa">카테고리: Loop 🟣</text>

  <rect x="335" y="330" width="145" height="100" rx="6" fill="#4a1d96" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="407" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">RepeatTimerNode</text>
  <text x="407" y="366" text-anchor="middle" font-size="8" fill="#ddd6fe">RepeatCount, IntervalMs</text>
  <text x="407" y="380" text-anchor="middle" font-size="8" fill="#ddd6fe">RepeatBody</text>
  <text x="407" y="394" text-anchor="middle" font-size="8" fill="#ddd6fe">CancellationToken 지원</text>
  <rect x="342" y="406" width="130" height="18" rx="3" fill="#3b1576"/>
  <text x="407" y="419" text-anchor="middle" font-size="8" fill="#a78bfa">카테고리: Loop 🟣</text>

  <rect x="490" y="330" width="145" height="100" rx="6" fill="#4a1d96" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="562" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">WaitForPacketNode</text>
  <text x="562" y="366" text-anchor="middle" font-size="8" fill="#ddd6fe">ExpectedPacketId</text>
  <text x="562" y="380" text-anchor="middle" font-size="8" fill="#ddd6fe">TimeoutMs + TimeoutNodes</text>
  <text x="562" y="394" text-anchor="middle" font-size="8" fill="#ddd6fe">__received_ 키 폴링</text>
  <rect x="497" y="406" width="130" height="18" rx="3" fill="#3b1576"/>
  <text x="562" y="419" text-anchor="middle" font-size="8" fill="#a78bfa">카테고리: Loop 🟣</text>

  <rect x="645" y="330" width="195" height="100" rx="6" fill="#4a1d96" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="742" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">AssertNode / RetryNode</text>
  <text x="742" y="366" text-anchor="middle" font-size="8" fill="#ddd6fe">Assert: Condition + StopOnFailure</text>
  <text x="742" y="380" text-anchor="middle" font-size="8" fill="#ddd6fe">Retry: MaxRetries + Backoff</text>
  <text x="742" y="394" text-anchor="middle" font-size="8" fill="#ddd6fe">FailureNodes 필수</text>
  <rect x="652" y="406" width="181" height="18" rx="3" fill="#3b1576"/>
  <text x="742" y="419" text-anchor="middle" font-size="8" fill="#a78bfa">카테고리: Loop 🟣</text>

  <!-- Also: Log/Disconnect/Var nodes from ContextNodeBase -->
  <line x1="430" y1="174" x2="97"  y2="328" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="174" x2="255" y2="328" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="174" x2="407" y2="328" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="174" x2="562" y2="328" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="430" y1="174" x2="742" y2="328" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- ContextNodeBase also includes LogNode, DisconnectNode, etc. -->
  <text x="430" y="205" text-anchor="middle" font-size="9" fill="#6b7280">+ LogNode · DisconnectNode · SetVariableNode · GetVariableNode · PacketParserNode</text>
</svg>
