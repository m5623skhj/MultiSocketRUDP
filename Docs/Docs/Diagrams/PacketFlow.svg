<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#6b7280"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arr-y" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="860" height="580" fill="#0f172a" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">패킷 수신 처리 파이프라인</text>

  <!-- Step 1: RIO Recv -->
  <rect x="20" y="55" width="820" height="78" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="40" y="73" font-size="10" font-weight="700" fill="#60a5fa">① IO Worker Thread — RIO 수신 완료</text>
  <rect x="30" y="80" width="160" height="42" rx="6" fill="#1d4ed8"/>
  <text x="110" y="97" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">RIODequeueCompletion</text>
  <text x="110" y="112" text-anchor="middle" font-size="9" fill="#bfdbfe">RIORESULT 배열 (최대 1024)</text>

  <line x1="192" y1="101" x2="212" y2="101" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="214" y="80" width="160" height="42" rx="6" fill="#1d4ed8"/>
  <text x="294" y="97" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">GetIOCompletedContext</text>
  <text x="294" y="112" text-anchor="middle" font-size="9" fill="#bfdbfe">session = GetUsingSession(id)</text>

  <line x1="376" y1="101" x2="396" y2="101" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="398" y="80" width="160" height="42" rx="6" fill="#1d4ed8"/>
  <text x="478" y="97" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">RecvIOCompleted</text>
  <text x="478" y="112" text-anchor="middle" font-size="9" fill="#bfdbfe">NetBuffer::Alloc + memcpy</text>

  <line x1="560" y1="101" x2="580" y2="101" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="582" y="80" width="248" height="42" rx="6" fill="#1d4ed8"/>
  <text x="706" y="97" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">EnqueueContextResult + DoRecv</text>
  <text x="706" y="112" text-anchor="middle" font-size="9" fill="#bfdbfe">recvIOCompletedContexts[id].Enqueue → Semaphore.Release</text>

  <!-- Step 2: Logic Worker -->
  <rect x="20" y="148" width="820" height="78" rx="8" fill="#0f2b1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="40" y="166" font-size="10" font-weight="700" fill="#34d399">② RecvLogic Worker Thread — 패킷 디코딩</text>

  <rect x="30" y="173" width="148" height="42" rx="6" fill="#065f46"/>
  <text x="104" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Semaphore 대기</text>
  <text x="104" y="205" text-anchor="middle" font-size="9" fill="#a7f3d0">WaitForMultipleObjects</text>

  <line x1="180" y1="194" x2="200" y2="194" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="202" y="173" width="148" height="42" rx="6" fill="#065f46"/>
  <text x="276" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Context Dequeue</text>
  <text x="276" y="205" text-anchor="middle" font-size="9" fill="#a7f3d0">recvBufferList.Dequeue</text>

  <line x1="352" y1="194" x2="372" y2="194" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="374" y="173" width="148" height="42" rx="6" fill="#065f46"/>
  <text x="448" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PacketProcessor</text>
  <text x="448" y="205" text-anchor="middle" font-size="9" fill="#a7f3d0">::OnRecvPacket(session)</text>

  <line x1="524" y1="194" x2="544" y2="194" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="546" y="173" width="284" height="42" rx="6" fill="#065f46"/>
  <text x="688" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ProcessByPacketType</text>
  <text x="688" y="205" text-anchor="middle" font-size="9" fill="#a7f3d0">packetType 추출 → DecodePacket(AES-GCM)</text>

  <!-- Step 3: Packet Type Branch -->
  <rect x="20" y="240" width="820" height="105" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="40" y="258" font-size="10" font-weight="700" fill="#fbbf24">③ 패킷 타입별 분기</text>

  <rect x="30" y="265" width="130" height="68" rx="6" fill="#451a03"/>
  <text x="95" y="283" text-anchor="middle" font-size="9" font-weight="600" fill="#fde68a">CONNECT_TYPE</text>
  <text x="95" y="298" text-anchor="middle" font-size="8" fill="#fcd34d">TryConnect()</text>
  <text x="95" y="311" text-anchor="middle" font-size="8" fill="#fcd34d">RESERVED→CONNECTED</text>
  <text x="95" y="324" text-anchor="middle" font-size="8" fill="#fcd34d">OnConnected()</text>

  <rect x="174" y="265" width="130" height="68" rx="6" fill="#1a3828"/>
  <text x="239" y="283" text-anchor="middle" font-size="9" font-weight="600" fill="#4ade80">SEND_TYPE</text>
  <text x="239" y="298" text-anchor="middle" font-size="8" fill="#86efac">CanAccept() 확인</text>
  <text x="239" y="311" text-anchor="middle" font-size="8" fill="#86efac">PacketOrderer</text>
  <text x="239" y="324" text-anchor="middle" font-size="8" fill="#86efac">::OnReceive()</text>

  <rect x="318" y="265" width="130" height="68" rx="6" fill="#1a3828"/>
  <text x="383" y="283" text-anchor="middle" font-size="9" font-weight="600" fill="#4ade80">SEND_REPLY_TYPE</text>
  <text x="383" y="298" text-anchor="middle" font-size="8" fill="#86efac">OnSendReply()</text>
  <text x="383" y="311" text-anchor="middle" font-size="8" fill="#86efac">SendPacketInfo 제거</text>
  <text x="383" y="324" text-anchor="middle" font-size="8" fill="#86efac">TryFlushPending()</text>

  <rect x="462" y="265" width="148" height="68" rx="6" fill="#1a2030"/>
  <text x="536" y="283" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">HEARTBEAT_TYPE</text>
  <text x="536" y="298" text-anchor="middle" font-size="8" fill="#93c5fd">PacketOrderer에 추가</text>
  <text x="536" y="311" text-anchor="middle" font-size="8" fill="#93c5fd">HEARTBEAT_REPLY 전송</text>

  <rect x="624" y="265" width="206" height="68" rx="6" fill="#2d1515"/>
  <text x="727" y="283" text-anchor="middle" font-size="9" font-weight="600" fill="#f87171">DISCONNECT_TYPE</text>
  <text x="727" y="298" text-anchor="middle" font-size="8" fill="#fca5a5">CanProcessPacket() 확인</text>
  <text x="727" y="311" text-anchor="middle" font-size="8" fill="#fca5a5">Disconnect(recvPacket)</text>
  <text x="727" y="324" text-anchor="middle" font-size="8" fill="#fca5a5">DoDisconnect()</text>

  <!-- Step 4: SEND_TYPE detail -->
  <rect x="20" y="360" width="820" height="100" rx="8" fill="#0f2b1e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="40" y="378" font-size="10" font-weight="700" fill="#22c55e">④ SEND_TYPE 상세 — SessionPacketOrderer</text>

  <rect x="30" y="385" width="150" height="62" rx="6" fill="#064e3b"/>
  <text x="105" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">seq == expected?</text>
  <text x="105" y="418" text-anchor="middle" font-size="8" fill="#a7f3d0">nextRecvPacketSequence</text>
  <text x="105" y="432" text-anchor="middle" font-size="8" fill="#a7f3d0">atomic 비교</text>
  <text x="105" y="446" text-anchor="middle" font-size="8" fill="#a7f3d0">예) C→S seq=5, next=5 → 처리</text>

  <line x1="182" y1="416" x2="202" y2="416" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="190" y="410" text-anchor="middle" font-size="8" fill="#4ade80">YES</text>
  <line x1="182" y1="435" x2="202" y2="460" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="190" y="453" text-anchor="middle" font-size="8" fill="#f87171">NO</text>

  <rect x="204" y="385" width="150" height="62" rx="6" fill="#064e3b"/>
  <text x="279" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ProcessPacket()</text>
  <text x="279" y="418" text-anchor="middle" font-size="8" fill="#a7f3d0">packetId → 핸들러 조회</text>
  <text x="279" y="432" text-anchor="middle" font-size="8" fill="#a7f3d0">역직렬화 + 함수 호출</text>
  <text x="279" y="446" text-anchor="middle" font-size="8" fill="#a7f3d0">MarkReceived + SendReply</text>

  <rect x="204" y="455" width="150" height="28" rx="6" fill="#3b1515"/>
  <text x="279" y="473" text-anchor="middle" font-size="9" fill="#fca5a5">seq &lt; expected → DUPLICATED (재ACK)</text>

  <line x1="356" y1="416" x2="376" y2="416" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="378" y="385" width="196" height="62" rx="6" fill="#064e3b"/>
  <text x="476" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ProcessHoldingPacket()</text>
  <text x="476" y="418" text-anchor="middle" font-size="8" fill="#a7f3d0">priority_queue 연속 처리</text>
  <text x="476" y="432" text-anchor="middle" font-size="8" fill="#a7f3d0">next, next+1, next+2... 순서대로</text>
  <text x="476" y="446" text-anchor="middle" font-size="8" fill="#a7f3d0">없으면 중단</text>

  <rect x="378" y="455" width="196" height="28" rx="6" fill="#1a2030"/>
  <text x="476" y="473" text-anchor="middle" font-size="9" fill="#93c5fd">seq &gt; expected → HoldingQueue 보관</text>

  <line x1="576" y1="416" x2="596" y2="416" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="598" y="385" width="212" height="62" rx="6" fill="#064e3b"/>
  <text x="704" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">SendReplyToClient(seq)</text>
  <text x="704" y="418" text-anchor="middle" font-size="8" fill="#a7f3d0">SEND_REPLY_TYPE + seq + window</text>
  <text x="704" y="432" text-anchor="middle" font-size="8" fill="#a7f3d0">GetAdvertisableWindow()</text>
  <text x="704" y="446" text-anchor="middle" font-size="8" fill="#a7f3d0">isReplyType=true → 즉시전송</text>

  <!-- Step 5: Content handler -->
  <rect x="20" y="472" width="820" height="88" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="40" y="490" font-size="10" font-weight="700" fill="#a78bfa">⑤ 콘텐츠 레이어 (Player 등 상속 클래스)</text>
  <rect x="30" y="498" width="220" height="50" rx="6" fill="#3b0764"/>
  <text x="140" y="515" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">packetFactoryMap[packetId]</text>
  <text x="140" y="529" text-anchor="middle" font-size="8" fill="#ddd6fe">RegisterPacketHandler&lt;Player, PingPacket&gt;()</text>
  <text x="140" y="543" text-anchor="middle" font-size="8" fill="#c4b5fd">람다: 역직렬화 → Player::OnPing()</text>
  <rect x="264" y="498" width="250" height="50" rx="6" fill="#3b0764"/>
  <text x="389" y="515" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PacketGenerator 자동 생성</text>
  <text x="389" y="529" text-anchor="middle" font-size="8" fill="#ddd6fe">PacketDefine.yml → Player.h/cpp</text>
  <text x="389" y="543" text-anchor="middle" font-size="8" fill="#c4b5fd">void OnPing(const Ping&amp; packet) { ... }</text>
  <rect x="528" y="498" width="302" height="50" rx="6" fill="#3b0764"/>
  <text x="679" y="515" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ContentsPacketRegister::Init()</text>
  <text x="679" y="529" text-anchor="middle" font-size="8" fill="#ddd6fe">PacketHandlerUtil::RegisterPacket&lt;PingPacket&gt;()</text>
  <text x="679" y="543" text-anchor="middle" font-size="8" fill="#c4b5fd">PacketManager::packetFactoryFunctionMap에 등록</text>
</svg>
