<svg viewBox="0 0 860 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arr-y" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="860" height="700" fill="#0f172a" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">연결 시퀀스 다이어그램</text>

  <!-- Participant headers -->
  <rect x="40" y="55" width="130" height="40" rx="8" fill="#1d4ed8"/>
  <text x="105" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Client</text>

  <rect x="240" y="55" width="170" height="40" rx="8" fill="#92400e"/>
  <text x="325" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SessionBroker</text>
  <text x="325" y="92" text-anchor="middle" font-size="9" fill="#fde68a">(TCP + TLS)</text>

  <rect x="490" y="55" width="160" height="40" rx="8" fill="#065f46"/>
  <text x="570" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">RUDPSession</text>
  <text x="570" y="92" text-anchor="middle" font-size="9" fill="#a7f3d0">(RESERVED)</text>

  <rect x="700" y="55" width="130" height="40" rx="8" fill="#4c1d95"/>
  <text x="765" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Server Core</text>

  <!-- Lifelines -->
  <line x1="105" y1="95" x2="105" y2="680" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="325" y1="95" x2="325" y2="680" stroke="#92400e" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="570" y1="95" x2="570" y2="680" stroke="#065f46" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="765" y1="95" x2="765" y2="680" stroke="#4c1d95" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Phase 1: TLS Session Acquisition -->
  <rect x="20" y="108" width="820" height="20" rx="4" fill="#1e3a5f" opacity="0.7"/>
  <text x="430" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Phase 1: TLS 세션 정보 획득</text>

  <!-- TCP Connect -->
  <line x1="105" y1="145" x2="315" y2="145" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-y)"/>
  <text x="210" y="140" text-anchor="middle" font-size="9" fill="#fbbf24">TCP connect()</text>

  <!-- TLS Handshake -->
  <line x1="315" y1="165" x2="115" y2="165" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-y)"/>
  <text x="210" y="160" text-anchor="middle" font-size="9" fill="#fbbf24">TLS ServerHello + Cert</text>
  <line x1="105" y1="182" x2="315" y2="182" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-y)"/>
  <text x="210" y="177" text-anchor="middle" font-size="9" fill="#fbbf24">TLS ClientKeyExchange + Finished</text>
  <line x1="315" y1="199" x2="115" y2="199" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-y)"/>
  <text x="210" y="194" text-anchor="middle" font-size="9" fill="#fbbf24">TLS Finished ← 핸드셰이크 완료</text>

  <!-- Broker acquires session -->
  <line x1="325" y1="220" x2="755" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="540" y="215" text-anchor="middle" font-size="9" fill="#94a3b8">AcquireSession()</text>

  <line x1="755" y1="238" x2="335" y2="238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="540" y="234" text-anchor="middle" font-size="9" fill="#94a3b8">RUDPSession* (DISCONNECTED→RESERVED)</text>

  <!-- InitReserveSession -->
  <line x1="325" y1="255" x2="560" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="250" text-anchor="middle" font-size="9" fill="#94a3b8">InitReserveSession(session)</text>

  <!-- UDP socket creation -->
  <rect x="475" y="265" width="190" height="32" rx="5" fill="#0f2b1e"/>
  <text x="570" y="279" text-anchor="middle" font-size="9" fill="#4ade80">UDP 소켓 생성 + bind</text>
  <text x="570" y="291" text-anchor="middle" font-size="9" fill="#4ade80">RIO 초기화 + DoRecv 등록</text>

  <!-- Crypto key gen -->
  <line x1="325" y1="310" x2="560" y2="310" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="305" text-anchor="middle" font-size="9" fill="#94a3b8">GenerateSessionKey/Salt</text>
  <rect x="475" y="318" width="190" height="20" rx="4" fill="#0f2b1e"/>
  <text x="570" y="332" text-anchor="middle" font-size="9" fill="#4ade80">BCryptGenRandom × 2 (32B)</text>

  <!-- Send session info -->
  <line x1="315" y1="355" x2="115" y2="355" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="210" y="350" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="600">[TLS] {IP, Port, SessionId, Key, Salt}</text>

  <!-- TLS Close -->
  <line x1="105" y1="373" x2="315" y2="373" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-y)"/>
  <text x="210" y="368" text-anchor="middle" font-size="9" fill="#fbbf24">close_notify / TCP FIN</text>

  <!-- Phase 2: RUDP Connection -->
  <rect x="20" y="390" width="820" height="20" rx="4" fill="#1a3828" opacity="0.7"/>
  <text x="430" y="404" text-anchor="middle" font-size="10" font-weight="600" fill="#34d399">Phase 2: UDP RUDP 연결 수립</text>

  <!-- CONNECT packet -->
  <line x1="105" y1="425" x2="560" y2="425" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="330" y="420" text-anchor="middle" font-size="9" fill="#60a5fa" font-weight="600">[UDP] CONNECT_TYPE | seq=0 | sessionId (AES-GCM)</text>

  <!-- TryConnect -->
  <rect x="475" y="433" width="190" height="32" rx="5" fill="#0f2b1e"/>
  <text x="570" y="447" text-anchor="middle" font-size="9" fill="#4ade80">TryConnect() 검증</text>
  <text x="570" y="459" text-anchor="middle" font-size="9" fill="#4ade80">RESERVED → CONNECTED</text>

  <!-- SEND_REPLY (ACK for connect) -->
  <line x1="560" y1="478" x2="115" y2="478" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="330" y="474" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="600">[UDP] SEND_REPLY_TYPE | seq=0 | window (AES-GCM)</text>

  <!-- Phase 3: Normal operation -->
  <rect x="20" y="495" width="820" height="20" rx="4" fill="#1e293b" opacity="0.7"/>
  <text x="430" y="509" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Phase 3: 정상 데이터 송수신</text>

  <!-- Client sends data -->
  <line x1="105" y1="530" x2="560" y2="530" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="330" y="526" text-anchor="middle" font-size="9" fill="#60a5fa">[UDP] SEND_TYPE | seq=N | packetId | payload (AES-GCM)</text>

  <!-- Server ACK -->
  <line x1="560" y1="548" x2="115" y2="548" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="330" y="544" text-anchor="middle" font-size="9" fill="#22c55e">[UDP] SEND_REPLY_TYPE | seq=N | window</text>

  <!-- Server pushes data -->
  <line x1="560" y1="566" x2="115" y2="566" stroke="#f472b6" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="330" y="562" text-anchor="middle" font-size="9" fill="#f472b6">[UDP] SEND_TYPE | seq=M | packetId | payload (AES-GCM)</text>

  <!-- Client ACK -->
  <line x1="105" y1="584" x2="560" y2="584" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="330" y="580" text-anchor="middle" font-size="9" fill="#22c55e">[UDP] SEND_REPLY_TYPE | seq=M | window</text>

  <!-- Heartbeat -->
  <line x1="560" y1="606" x2="115" y2="606" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="330" y="602" text-anchor="middle" font-size="9" fill="#94a3b8">[UDP] HEARTBEAT_TYPE | seq=K (주기적)</text>
  <line x1="105" y1="622" x2="560" y2="622" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="330" y="640" text-anchor="middle" font-size="9" fill="#94a3b8">[UDP] HEARTBEAT_REPLY_TYPE | seq=K</text>

  <!-- Legend bottom -->
  <rect x="20" y="655" width="820" height="35" rx="6" fill="#1e293b"/>
  <text x="40" y="672" font-size="9" fill="#fbbf24">━ TLS/TCP</text>
  <text x="120" y="672" font-size="9" fill="#60a5fa">━ UDP C→S</text>
  <text x="210" y="672" font-size="9" fill="#22c55e">━ UDP S→C (ACK/데이터)</text>
  <text x="380" y="672" font-size="9" fill="#f472b6">━ UDP S→C (Push)</text>
  <text x="500" y="672" font-size="9" fill="#94a3b8">╌ 하트비트</text>
  <text x="580" y="672" font-size="9" fill="#4ade80">■ 서버 내부 처리</text>
  <text x="690" y="672" font-size="9" fill="#ddd6fe">AES-GCM 암호화 적용됨</text>
</svg>
