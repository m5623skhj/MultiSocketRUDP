  <rect x="685" y="374" width="210" height="62" rx="5" fill="#1e3050" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="790" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">SetVariable / GetVariable</text>
