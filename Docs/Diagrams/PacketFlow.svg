<svg viewBox="0 0 880 810" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr"   markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#6b7280"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#34d399"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#f87171"/></marker>
  </defs>
  <rect width="880" height="810" fill="#0f172a" rx="12"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">패킷 수신 처리 파이프라인</text>

  <!-- 1 IO Worker -->
  <rect x="20" y="50" width="840" height="80" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="40" y="68" font-size="10" font-weight="700" fill="#60a5fa">① IO Worker Thread — RIO 수신 완료</text>
  <rect x="30" y="75" width="165" height="42" rx="6" fill="#1d4ed8"/>
  <text x="112" y="92"  text-anchor="middle" font-size="9" font-weight="600" fill="#fff">RIODequeueCompletion</text>
  <text x="112" y="107" text-anchor="middle" font-size="8" fill="#bfdbfe">RIORESULT 배열 (최대 1024)</text>
  <line x1="197" y1="96" x2="215" y2="96" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="217" y="75" width="165" height="42" rx="6" fill="#1d4ed8"/>
  <text x="299" y="92"  text-anchor="middle" font-size="9" font-weight="600" fill="#fff">GetIOCompletedContext</text>
  <text x="299" y="107" text-anchor="middle" font-size="8" fill="#bfdbfe">session = GetUsingSession(id)</text>
  <line x1="384" y1="96" x2="402" y2="96" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="404" y="75" width="160" height="42" rx="6" fill="#1d4ed8"/>
  <text x="484" y="92"  text-anchor="middle" font-size="9" font-weight="600" fill="#fff">RecvIOCompleted</text>
  <text x="484" y="107" text-anchor="middle" font-size="8" fill="#bfdbfe">NetBuffer::Alloc + memcpy</text>
  <line x1="566" y1="96" x2="584" y2="96" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="586" y="75" width="264" height="42" rx="6" fill="#1d4ed8"/>
  <text x="718" y="92"  text-anchor="middle" font-size="9" font-weight="600" fill="#fff">EnqueueContextResult + DoRecv</text>
  <text x="718" y="107" text-anchor="middle" font-size="8" fill="#bfdbfe">recvIOCompletedContexts[id].Enqueue → Semaphore 신호</text>

  <!-- 2 RecvLogic Worker -->
  <rect x="20" y="145" width="840" height="80" rx="8" fill="#0f2b1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="40" y="163" font-size="10" font-weight="700" fill="#34d399">② RecvLogic Worker Thread — 패킷 디코딩</text>
  <rect x="30" y="168" width="155" height="42" rx="6" fill="#065f46"/>
  <text x="107" y="185" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Semaphore 대기</text>
  <text x="107" y="200" text-anchor="middle" font-size="8" fill="#a7f3d0">WaitForMultipleObjects</text>
  <line x1="187" y1="189" x2="205" y2="189" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="207" y="168" width="155" height="42" rx="6" fill="#065f46"/>
  <text x="284" y="185" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Context Dequeue</text>
  <text x="284" y="200" text-anchor="middle" font-size="8" fill="#a7f3d0">recvBufferList.Dequeue</text>
  <line x1="364" y1="189" x2="382" y2="189" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="384" y="168" width="155" height="42" rx="6" fill="#065f46"/>
  <text x="461" y="185" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PacketProcessor</text>
  <text x="461" y="200" text-anchor="middle" font-size="8" fill="#a7f3d0">::OnRecvPacket(session)</text>
  <line x1="541" y1="189" x2="559" y2="189" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="561" y="168" width="289" height="42" rx="6" fill="#065f46"/>
  <text x="705" y="185" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ProcessByPacketType</text>
  <text x="705" y="200" text-anchor="middle" font-size="8" fill="#a7f3d0">packetType 추출 → AES-GCM DecodePacket</text>

  <!-- 3 PacketType Branch -->
  <rect x="20" y="238" width="840" height="108" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="40" y="256" font-size="10" font-weight="700" fill="#fbbf24">③ 패킷 타입별 분기</text>
  <rect x="30"  y="263" width="136" height="72" rx="6" fill="#451a03"/>
  <text x="98"  y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#fde68a">CONNECT_TYPE</text>
  <text x="98"  y="295" text-anchor="middle" font-size="8" fill="#fcd34d">TryConnect()</text>
  <text x="98"  y="308" text-anchor="middle" font-size="8" fill="#fcd34d">RESERVED→CONNECTED</text>
  <text x="98"  y="321" text-anchor="middle" font-size="8" fill="#fcd34d">OnConnected() 훅</text>
  <rect x="176" y="263" width="136" height="72" rx="6" fill="#1a3828"/>
  <text x="244" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#4ade80">SEND_TYPE</text>
  <text x="244" y="295" text-anchor="middle" font-size="8" fill="#86efac">CanProcessPacket() 확인</text>
  <text x="244" y="308" text-anchor="middle" font-size="8" fill="#86efac">PacketOrderer</text>
  <text x="244" y="321" text-anchor="middle" font-size="8" fill="#86efac">::OnReceive()  ▼ ④</text>
  <rect x="322" y="263" width="155" height="72" rx="6" fill="#1a3828"/>
  <text x="399" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#4ade80">SEND_REPLY_TYPE</text>
  <text x="399" y="295" text-anchor="middle" font-size="8" fill="#86efac">CanProcessPacket() 확인</text>
  <text x="399" y="308" text-anchor="middle" font-size="8" fill="#86efac">OnSendReply()</text>
  <text x="399" y="321" text-anchor="middle" font-size="8" fill="#86efac">TryFlushPendingQueue()</text>
  <rect x="487" y="263" width="150" height="72" rx="6" fill="#1a2030"/>
  <text x="562" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">HEARTBEAT_TYPE</text>
  <text x="562" y="295" text-anchor="middle" font-size="8" fill="#93c5fd">CanProcessPacket() 확인</text>
  <text x="562" y="308" text-anchor="middle" font-size="8" fill="#93c5fd">HEARTBEAT_REPLY 직접 송신</text>
  <text x="562" y="321" text-anchor="middle" font-size="8" fill="#93c5fd">(PacketOrderer 미사용)</text>
  <rect x="647" y="263" width="203" height="72" rx="6" fill="#2d1515"/>
  <text x="748" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#f87171">DISCONNECT_TYPE</text>
  <text x="748" y="295" text-anchor="middle" font-size="8" fill="#fca5a5">CanProcessPacket() 확인</text>
  <text x="748" y="308" text-anchor="middle" font-size="8" fill="#fca5a5">Disconnect(recvPacket)</text>
  <text x="748" y="321" text-anchor="middle" font-size="8" fill="#fca5a5">DoDisconnect(NORMAL)</text>

  <!-- arrow 3->4 -->
  <line x1="244" y1="346" x2="244" y2="360" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- 4 SEND_TYPE Detail -->
  <rect x="20" y="363" width="840" height="280" rx="8" fill="#0f2b1e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="40" y="381" font-size="10" font-weight="700" fill="#22c55e">④ SEND_TYPE 상세 — SessionPacketOrderer::OnReceive()</text>

  <!-- YES row banner -->
  <rect x="30" y="390" width="828" height="14" rx="3" fill="#062014"/>
  <text x="44" y="401" font-size="8" font-weight="700" fill="#4ade80">YES  seq == nextRecvPacketSequence  (정상 순서 도착)</text>

  <!-- YES boxes -->
  <rect x="30"  y="410" width="170" height="72" rx="6" fill="#064e3b"/>
  <text x="115" y="428" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">seq == expected?</text>
  <text x="115" y="442" text-anchor="middle" font-size="8" fill="#a7f3d0">nextRecvPacketSequence</text>
  <text x="115" y="455" text-anchor="middle" font-size="8" fill="#a7f3d0">atomic 비교</text>
  <text x="115" y="468" text-anchor="middle" font-size="8" fill="#a7f3d0">예) next=5, recv=5 → YES</text>
  <line x1="202" y1="446" x2="220" y2="446" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="211" y="440" text-anchor="middle" font-size="8" fill="#4ade80">YES</text>

  <rect x="222" y="410" width="168" height="72" rx="6" fill="#064e3b"/>
  <text x="306" y="428" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ProcessPacket()</text>
  <text x="306" y="442" text-anchor="middle" font-size="8" fill="#a7f3d0">packetId → 핸들러 조회</text>
  <text x="306" y="455" text-anchor="middle" font-size="8" fill="#a7f3d0">역직렬화 + 함수 호출</text>
  <text x="306" y="468" text-anchor="middle" font-size="8" fill="#a7f3d0">nextRecvSeq++</text>
  <line x1="392" y1="446" x2="410" y2="446" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="412" y="410" width="200" height="72" rx="6" fill="#064e3b"/>
  <text x="512" y="428" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ProcessHoldingPacket()</text>
  <text x="512" y="442" text-anchor="middle" font-size="8" fill="#a7f3d0">HoldingQueue(min-heap) 연속 처리</text>
  <text x="512" y="455" text-anchor="middle" font-size="8" fill="#a7f3d0">top == next → ProcessPacket</text>
  <text x="512" y="468" text-anchor="middle" font-size="8" fill="#a7f3d0">top &gt; next → 중단</text>
  <line x1="614" y1="446" x2="632" y2="446" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="634" y="410" width="216" height="72" rx="6" fill="#064e3b"/>
  <text x="742" y="428" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">SendReplyToClient(seq)</text>
  <text x="742" y="442" text-anchor="middle" font-size="8" fill="#a7f3d0">SEND_REPLY_TYPE 송신</text>
  <text x="742" y="455" text-anchor="middle" font-size="8" fill="#a7f3d0">GetAdvertisableWindow()</text>
  <text x="742" y="468" text-anchor="middle" font-size="8" fill="#a7f3d0">isReplyType=true → 즉시 전송</text>

  <!-- NO row separator -->
  <line x1="30" y1="494" x2="858" y2="494" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- NO row banner -->
  <rect x="30" y="497" width="828" height="14" rx="3" fill="#200c0c"/>
  <text x="44" y="508" font-size="8" font-weight="700" fill="#f87171">NO  seq != nextRecvPacketSequence  (비정상 순서 — 3가지 케이스)</text>

  <!-- NO arrow from decision box -->
  <line x1="115" y1="482" x2="115" y2="497" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="125" y="493" font-size="8" fill="#f87171">NO</text>

  <!-- NO box 1: seq > expected -->
  <rect x="30"  y="518" width="263" height="110" rx="6" fill="#1a2030" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="161" y="536" text-anchor="middle" font-size="9" font-weight="700" fill="#93c5fd">seq &gt; expected  (미래 패킷)</text>
  <line x1="30" y1="546" x2="293" y2="546" stroke="#1e3a5f" stroke-width="1"/>
  <text x="161" y="561" text-anchor="middle" font-size="8" fill="#60a5fa">결과: PACKET_HELD</text>
  <text x="161" y="575" text-anchor="middle" font-size="8" fill="#93c5fd">HoldingQueue(min-heap)에 보관</text>
  <text x="161" y="589" text-anchor="middle" font-size="8" fill="#93c5fd">예) next=5, recv=7 → 큐에 삽입</text>
  <text x="161" y="603" text-anchor="middle" font-size="8" fill="#6b7280">ACK 없음 (클라이언트가 재전송)</text>
  <text x="161" y="619" text-anchor="middle" font-size="8" fill="#f59e0b">큐 가득 참 → ERROR → DoDisconnect</text>

  <!-- NO box 2: seq < expected -->
  <rect x="304" y="518" width="263" height="110" rx="6" fill="#1a2010" stroke="#4ade80" stroke-width="1.2"/>
  <text x="435" y="536" text-anchor="middle" font-size="9" font-weight="700" fill="#86efac">seq &lt; expected  (중복 패킷)</text>
  <line x1="304" y1="546" x2="567" y2="546" stroke="#1a2810" stroke-width="1"/>
  <text x="435" y="561" text-anchor="middle" font-size="8" fill="#4ade80">결과: DUPLICATED_RECV</text>
  <text x="435" y="575" text-anchor="middle" font-size="8" fill="#86efac">이미 처리한 seq 재수신</text>
  <text x="435" y="589" text-anchor="middle" font-size="8" fill="#86efac">예) next=5, recv=3 → 중복</text>
  <text x="435" y="603" text-anchor="middle" font-size="8" fill="#86efac">재ACK 전송 (SendReplyToClient)</text>
  <text x="435" y="619" text-anchor="middle" font-size="8" fill="#6b7280">데이터는 폐기, 세션 유지</text>

  <!-- NO box 3: queue full -->
  <rect x="578" y="518" width="272" height="110" rx="6" fill="#2d1515" stroke="#f87171" stroke-width="1.2"/>
  <text x="714" y="536" text-anchor="middle" font-size="9" font-weight="700" fill="#f87171">HoldingQueue 가득 참</text>
  <line x1="578" y1="546" x2="850" y2="546" stroke="#2a1010" stroke-width="1"/>
  <text x="714" y="561" text-anchor="middle" font-size="8" fill="#f87171">결과: ERROR_OCCURED</text>
  <text x="714" y="575" text-anchor="middle" font-size="8" fill="#fca5a5">MAX_HOLDING_QUEUE_SIZE 초과</text>
  <text x="714" y="589" text-anchor="middle" font-size="8" fill="#fca5a5">LOG_ERROR 출력</text>
  <text x="714" y="603" text-anchor="middle" font-size="8" fill="#fca5a5">session.DoDisconnect(BY_ERROR)</text>
  <text x="714" y="619" text-anchor="middle" font-size="8" fill="#6b7280">옵션: MAX_HOLDING_PACKET_QUEUE_SIZE</text>

  <!-- arrow 4->5 -->
  <line x1="440" y1="646" x2="440" y2="660" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5 Contents Layer -->
  <rect x="20" y="663" width="840" height="118" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="40" y="681" font-size="10" font-weight="700" fill="#a78bfa">⑤ 콘텐츠 레이어 (Player 등 상속 클래스)</text>
  <rect x="30"  y="690" width="240" height="78" rx="6" fill="#3b0764"/>
  <text x="150" y="707" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">packetFactoryMap[packetId]</text>
  <text x="150" y="721" text-anchor="middle" font-size="8" fill="#ddd6fe">RegisterPacketHandler&lt;Player, Ping&gt;()</text>
  <text x="150" y="734" text-anchor="middle" font-size="8" fill="#c4b5fd">람다: 역직렬화 → Player::OnPing()</text>
  <text x="150" y="748" text-anchor="middle" font-size="8" fill="#c4b5fd">생성자에서 등록 (초기화 시 1회)</text>
  <text x="150" y="762" text-anchor="middle" font-size="8" fill="#7c5fa0">※ StartServer 이전에 Init() 필수</text>
  <rect x="282" y="690" width="268" height="78" rx="6" fill="#3b0764"/>
  <text x="416" y="707" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PacketGenerator 자동 생성</text>
  <text x="416" y="721" text-anchor="middle" font-size="8" fill="#ddd6fe">PacketDefine.yml → Protocol.h/cpp</text>
  <text x="416" y="734" text-anchor="middle" font-size="8" fill="#c4b5fd">PlayerPacketHandlerRegister.cpp 생성</text>
  <text x="416" y="748" text-anchor="middle" font-size="8" fill="#c4b5fd">void OnPing(const Ping&amp; pkt) { ... }</text>
  <text x="416" y="762" text-anchor="middle" font-size="8" fill="#7c5fa0">Tool/PacketGenerator 참조</text>
  <rect x="562" y="690" width="298" height="78" rx="6" fill="#3b0764"/>
  <text x="711" y="707" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">ContentsPacketRegister::Init()</text>
  <text x="711" y="721" text-anchor="middle" font-size="8" fill="#ddd6fe">PacketHandlerUtil::RegisterPacket&lt;Ping&gt;()</text>
  <text x="711" y="734" text-anchor="middle" font-size="8" fill="#c4b5fd">PacketManager::packetFactoryFunctionMap 등록</text>
  <text x="711" y="748" text-anchor="middle" font-size="8" fill="#c4b5fd">packetId → IPacket* 팩토리 매핑</text>
  <text x="711" y="762" text-anchor="middle" font-size="8" fill="#7c5fa0">StartServer() 호출 이전에 실행</text>
</svg>
