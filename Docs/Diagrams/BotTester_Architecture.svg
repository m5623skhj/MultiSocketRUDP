<svg viewBox="0 0 920 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr"   markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#6b7280"/></marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#60a5fa"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#34d399"/></marker>
    <marker id="arr-p" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#a78bfa"/></marker>
    <marker id="arr-y" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 9 3, 0 6" fill="#fbbf24"/></marker>
  </defs>

  <rect width="920" height="630" fill="#0f172a" rx="12"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">MultiSocketRUDPBotTester — 전체 아키텍처</text>

  <!-- ══ WPF UI Layer ══ -->
  <rect x="20" y="52" width="545" height="165" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="72" font-size="11" font-weight="700" fill="#60a5fa">WPF UI Layer</text>

  <rect x="30"  y="80" width="138" height="52" rx="6" fill="#1d4ed8"/>
  <text x="99"  y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">MainWindow</text>
  <text x="99"  y="115" text-anchor="middle" font-size="9" fill="#bfdbfe">IP / Port / BotCount</text>
  <text x="99"  y="127" text-anchor="middle" font-size="9" fill="#bfdbfe">Start / Stop</text>

  <rect x="180" y="80" width="175" height="52" rx="6" fill="#1d4ed8"/>
  <text x="267" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">BotActionGraphWindow</text>
  <text x="267" y="115" text-anchor="middle" font-size="9" fill="#bfdbfe">비주얼 노드 에디터</text>
  <text x="267" y="127" text-anchor="middle" font-size="9" fill="#bfdbfe">Build / Validate / Apply</text>

  <rect x="368" y="80" width="187" height="52" rx="6" fill="#4c1d95"/>
  <text x="461" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">AI Tree Generator</text>
  <text x="461" y="115" text-anchor="middle" font-size="9" fill="#ddd6fe">자연어 입력 → JSON 트리</text>
  <text x="461" y="127" text-anchor="middle" font-size="9" fill="#ddd6fe">Gemini API 연동</text>

  <!-- Canvas / Interaction -->
  <rect x="30" y="144" width="525" height="62" rx="6" fill="#172032"/>
  <text x="292" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#60a5fa">Canvas Renderer  ·  Interaction Handler  ·  Node Config Panels</text>
  <text x="292" y="177" text-anchor="middle" font-size="9" fill="#6b7280">NodeCanvasRenderer · NodeInteractionHandler · NodeConfigPanelRegistry</text>
  <text x="292" y="191" text-anchor="middle" font-size="9" fill="#6b7280">포트 연결 · 드래그 · 순환 감지 · 설정 다이얼로그</text>

  <!-- ══ AI Layer ══ -->
  <rect x="578" y="52" width="322" height="165" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="598" y="72" font-size="11" font-weight="700" fill="#a78bfa">AI Layer (Google Gemini)</text>

  <rect x="588" y="80" width="302" height="52" rx="6" fill="#3b0764"/>
  <text x="739" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GeminiClient</text>
  <text x="739" y="115" text-anchor="middle" font-size="9" fill="#ddd6fe">AskAsync(prompt) · gemini-2.5-flash</text>
  <text x="739" y="127" text-anchor="middle" font-size="9" fill="#ddd6fe">HTTP POST → JSON 응답 파싱</text>

  <rect x="588" y="144" width="302" height="62" rx="6" fill="#172032"/>
  <text x="739" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#a78bfa">AiTreeService + AiNodeFactory</text>
  <text x="739" y="177" text-anchor="middle" font-size="9" fill="#6b7280">StripMarkdownFence() → JSON 파싱</text>
  <text x="739" y="191" text-anchor="middle" font-size="9" fill="#6b7280">JSON → NodeVisual 트리 생성 · 유효성 검사</text>

  <!-- ══ Bot Engine Layer ══ -->
  <rect x="20" y="232" width="545" height="182" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="252" font-size="11" font-weight="700" fill="#34d399">Bot Engine Layer</text>

  <rect x="30"  y="260" width="168" height="142" rx="6" fill="#064e3b"/>
  <text x="114" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">ActionGraph</text>
  <text x="114" y="294" text-anchor="middle" font-size="9" fill="#a7f3d0">TriggerEvent(type)</text>
  <text x="114" y="308" text-anchor="middle" font-size="9" fill="#6ee7b7">· OnConnected</text>
  <text x="114" y="322" text-anchor="middle" font-size="9" fill="#6ee7b7">· OnDisconnected</text>
  <text x="114" y="336" text-anchor="middle" font-size="9" fill="#6ee7b7">· OnPacketReceived</text>
  <text x="114" y="350" text-anchor="middle" font-size="9" fill="#6ee7b7">NodeExecutionHelper</text>
  <text x="114" y="364" text-anchor="middle" font-size="9" fill="#34d399">ExecuteChainWithStats</text>
  <text x="114" y="378" text-anchor="middle" font-size="9" fill="#4ade80">+ NodeExecutionStats</text>

  <rect x="210" y="260" width="168" height="142" rx="6" fill="#064e3b"/>
  <text x="294" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Node Types</text>
  <text x="294" y="296" text-anchor="middle" font-size="9" fill="#9ca3af">Action  (DimGray)</text>
  <text x="294" y="310" text-anchor="middle" font-size="9" fill="#6ee7b7">Send · Delay · Log</text>
  <text x="294" y="324" text-anchor="middle" font-size="9" fill="#6ee7b7">Disconnect · Variable</text>
  <text x="294" y="340" text-anchor="middle" font-size="9" fill="#fbbf24">Condition  (DarkOrange)</text>
  <text x="294" y="354" text-anchor="middle" font-size="9" fill="#fde68a">ConditionalNode</text>
  <text x="294" y="370" text-anchor="middle" font-size="9" fill="#a78bfa">Loop  (DarkMagenta)</text>
  <text x="294" y="384" text-anchor="middle" font-size="9" fill="#ddd6fe">Loop/Repeat/Wait/Retry</text>

  <rect x="390" y="260" width="165" height="142" rx="6" fill="#064e3b"/>
  <text x="472" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">RuntimeContext</text>
  <text x="472" y="296" text-anchor="middle" font-size="9" fill="#a7f3d0">ConcurrentDictionary</text>
  <text x="472" y="310" text-anchor="middle" font-size="9" fill="#6ee7b7">__received_{PacketId}</text>
  <text x="472" y="324" text-anchor="middle" font-size="9" fill="#6ee7b7">__loop_iteration</text>
  <text x="472" y="338" text-anchor="middle" font-size="9" fill="#6ee7b7">타이머 / 메트릭</text>
  <text x="472" y="352" text-anchor="middle" font-size="9" fill="#6ee7b7">AtomicIncrement</text>
  <text x="472" y="368" text-anchor="middle" font-size="9" fill="#34d399">GraphValidator</text>
  <text x="472" y="382" text-anchor="middle" font-size="9" fill="#4ade80">구조 · 순환 · 설정 검증</text>

  <!-- ══ Client Core Layer ══ -->
  <rect x="578" y="232" width="322" height="182" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="598" y="252" font-size="11" font-weight="700" fill="#fbbf24">Client Core (C# RUDP)</text>

  <rect x="588" y="260" width="302" height="58" rx="6" fill="#78350f"/>
  <text x="739" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">BotTesterCore (Singleton)</text>
  <text x="739" y="296" text-anchor="middle" font-size="9" fill="#fde68a">세션 딕셔너리 관리 · StartBotTest / StopBotTest</text>
  <text x="739" y="310" text-anchor="middle" font-size="9" fill="#fcd34d">Bot 수만큼 RudpSession 인스턴스 생성 및 관리</text>

  <rect x="588" y="330" width="142" height="72" rx="6" fill="#451a03"/>
  <text x="659" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">RudpSession</text>
  <text x="659" y="363" text-anchor="middle" font-size="9" fill="#fed7aa">UdpClient 소켓</text>
  <text x="659" y="377" text-anchor="middle" font-size="9" fill="#fed7aa">AES-GCM 암복호화</text>
  <text x="659" y="391" text-anchor="middle" font-size="9" fill="#fcd34d">재전송 30ms 주기</text>

  <rect x="740" y="330" width="150" height="72" rx="6" fill="#451a03"/>
  <text x="815" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">SessionGetter</text>
  <text x="815" y="363" text-anchor="middle" font-size="9" fill="#fed7aa">TLS 1.2 (SslStream)</text>
  <text x="815" y="377" text-anchor="middle" font-size="9" fill="#fed7aa">세션 정보 수신</text>
  <text x="815" y="391" text-anchor="middle" font-size="9" fill="#fcd34d">인증서 핀닝 지원</text>

  <!-- ══ Server reference ══ -->
  <rect x="20" y="428" width="880" height="52" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="449" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa">↕  MultiSocketRUDP Server (C++)  ↕</text>
  <text x="460" y="466" text-anchor="middle" font-size="9" fill="#6b7280">SessionBroker (TCP+TLS) ← 세션 정보 발급  ·  RUDPSession (UDP+RIO) ← 패킷 송수신 (AES-GCM)</text>

  <!-- ══ Arrows ══ -->
  <!-- BotActionGraphWindow → ActionGraph (Build/Apply) -->
  <line x1="267" y1="132" x2="267" y2="220" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="267" y1="220" x2="114" y2="220" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="114" y1="220" x2="114" y2="258" stroke="#34d399" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- MainWindow → BotTesterCore (Start/Stop) — routed via waypoints -->
  <polyline points="99,132 99,220 739,220 739,258" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arr-y)"/>

  <!-- AI → BotActionGraphWindow -->
  <line x1="588" y1="165" x2="557" y2="165" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- BotTesterCore → RudpSession -->
  <line x1="710" y1="318" x2="665" y2="328" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- BotTesterCore → SessionGetter -->
  <line x1="768" y1="318" x2="810" y2="328" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RudpSession → Server -->
  <line x1="659" y1="402" x2="659" y2="426" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-b)"/>
  <!-- SessionGetter → Server -->
  <line x1="815" y1="402" x2="815" y2="426" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-y)"/>

  <!-- ActionGraph → RuntimeContext -->
  <line x1="200" y1="331" x2="388" y2="331" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Legend ══ -->
  <rect x="20" y="494" width="880" height="118" rx="6" fill="#1e293b" stroke="#374151" stroke-width="1"/>
  <text x="460" y="514" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">범례</text>

  <!-- Row 1 -->
  <rect x="40"  y="524" width="12" height="12" rx="2" fill="#1d4ed8"/>
  <text x="58"  y="534" font-size="9" fill="#d1d5db">WPF UI</text>
  <rect x="130" y="524" width="12" height="12" rx="2" fill="#064e3b"/>
  <text x="148" y="534" font-size="9" fill="#d1d5db">Bot Engine</text>
  <rect x="248" y="524" width="12" height="12" rx="2" fill="#78350f"/>
  <text x="266" y="534" font-size="9" fill="#d1d5db">Client Core</text>
  <rect x="368" y="524" width="12" height="12" rx="2" fill="#3b0764"/>
  <text x="386" y="534" font-size="9" fill="#d1d5db">AI (Gemini)</text>

  <!-- Row 2 -->
  <line x1="40"  y1="556" x2="74"  y2="556" stroke="#34d399" stroke-width="2"/>
  <text x="82"  y="560" font-size="9" fill="#d1d5db">Build/Apply 흐름</text>
  <line x1="215" y1="556" x2="249" y2="556" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="257" y="560" font-size="9" fill="#d1d5db">UDP 통신</text>
  <line x1="350" y1="556" x2="384" y2="556" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="392" y="560" font-size="9" fill="#d1d5db">TLS 세션 발급 · Start/Stop 제어</text>
  <line x1="565" y1="556" x2="599" y2="556" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="607" y="560" font-size="9" fill="#d1d5db">AI 응답 전달</text>

  <!-- Row 3 note -->
  <text x="40" y="585" font-size="9" fill="#6b7280">* 모든 봇 Session은 독립 UDP 소켓 + AES-GCM 세션키를 보유. ActionGraph는 읽기 전용으로 공유됨.</text>
  <text x="40" y="600" font-size="9" fill="#6b7280">* MainWindow → BotTesterCore 화살표는 Start/Stop 제어 흐름을 나타냄 (y=220 경유).</text>
</svg>
