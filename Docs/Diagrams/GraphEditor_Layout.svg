<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="860" height="520" fill="#0f172a" rx="12"/>
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">BotActionGraphWindow — UI 구성</text>

  <!-- Window frame -->
  <rect x="20" y="50" width="820" height="440" rx="8" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="20" y="50" width="820" height="28" rx="8" fill="#374151"/>
  <text x="430" y="68" text-anchor="middle" font-size="10" fill="#d1d5db">Bot Action Graph [Maximized]</text>

  <!-- Left Panel -->
  <rect x="22" y="78" width="210" height="410" rx="4" fill="#1e293b" stroke="#374151" stroke-width="1"/>
  <text x="127" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">Left Panel (250px)</text>

  <!-- Node list -->
  <rect x="30" y="104" width="194" height="200" rx="4" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="127" y="120" text-anchor="middle" font-size="9" fill="#6b7280">ActionNodeListBox</text>
  <rect x="35" y="126" width="184" height="18" rx="3" fill="#1d4ed8"/>
  <text x="127" y="138" text-anchor="middle" font-size="8" fill="#fff">SendPacketNode</text>
  <rect x="35" y="148" width="184" height="18" rx="3" fill="#1f2937"/>
  <text x="127" y="160" text-anchor="middle" font-size="8" fill="#d1d5db">DelayNode</text>
  <rect x="35" y="170" width="184" height="18" rx="3" fill="#1f2937"/>
  <text x="127" y="182" text-anchor="middle" font-size="8" fill="#d1d5db">RandomDelayNode</text>
  <rect x="35" y="192" width="184" height="18" rx="3" fill="#1f2937"/>
  <text x="127" y="204" text-anchor="middle" font-size="8" fill="#f59e0b">ConditionalNode</text>
  <rect x="35" y="214" width="184" height="18" rx="3" fill="#1f2937"/>
  <text x="127" y="226" text-anchor="middle" font-size="8" fill="#8b5cf6">LoopNode</text>
  <rect x="35" y="236" width="184" height="18" rx="3" fill="#1f2937"/>
  <text x="127" y="248" text-anchor="middle" font-size="8" fill="#8b5cf6">WaitForPacketNode</text>
  <text x="127" y="272" text-anchor="middle" font-size="8" fill="#4b5563">... 전체 노드 타입 목록 ...</text>

  <!-- Buttons -->
  <rect x="30" y="313" width="194" height="34" rx="4" fill="#7c3aed"/>
  <text x="127" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">🤖 AI Tree Generator</text>

  <rect x="30" y="352" width="194" height="28" rx="4" fill="#374151"/>
  <text x="127" y="370" text-anchor="middle" font-size="9" fill="#d1d5db">Add Node</text>

  <rect x="30" y="385" width="194" height="28" rx="4" fill="#b45309"/>
  <text x="127" y="403" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Validate Graph</text>

  <rect x="30" y="418" width="194" height="28" rx="4" fill="#166534"/>
  <text x="127" y="436" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Build Graph</text>

  <rect x="30" y="451" width="194" height="28" rx="4" fill="#1d4ed8"/>
  <text x="127" y="469" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Apply to BotTester</text>

  <!-- Right Panel - Canvas -->
  <rect x="234" y="78" width="604" height="300" rx="4" fill="#222" stroke="#374151" stroke-width="1"/>
  <text x="536" y="97" text-anchor="middle" font-size="9" fill="#6b7280">GraphCanvas (5000×5000, ScrollViewer)</text>

  <!-- Sample nodes on canvas -->
  <!-- Root node -->
  <rect x="270" y="150" width="130" height="56" rx="6" fill="#065f46" stroke="#fff" stroke-width="2"/>
  <text x="335" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">OnConnected</text>
  <text x="335" y="190" text-anchor="middle" font-size="8" fill="#a7f3d0">Root (트리거)</text>
  <!-- Input port -->
  <ellipse cx="264" cy="178" rx="10" ry="10" fill="#4ade80" stroke="#fff" stroke-width="2"/>
  <!-- Output port default -->
  <ellipse cx="406" cy="178" rx="10" ry="10" fill="#60a5fa" stroke="#fff" stroke-width="2"/>

  <!-- SendPacket node -->
  <rect x="450" y="130" width="130" height="56" rx="6" fill="#374151" stroke="#fff" stroke-width="2"/>
  <text x="515" y="154" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">SendPacketNode</text>
  <text x="515" y="170" text-anchor="middle" font-size="8" fill="#9ca3af">PacketId: Ping</text>
  <ellipse cx="444" cy="158" rx="10" ry="10" fill="#4ade80" stroke="#fff" stroke-width="2"/>
  <ellipse cx="586" cy="158" rx="10" ry="10" fill="#60a5fa" stroke="#fff" stroke-width="2"/>

  <!-- WaitForPacket node -->
  <rect x="450" y="210" width="130" height="56" rx="6" fill="#4a1d96" stroke="#fff" stroke-width="2"/>
  <text x="515" y="232" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">WaitForPacketNode</text>
  <text x="515" y="248" text-anchor="middle" font-size="8" fill="#ddd6fe">timeout: 5000ms</text>
  <ellipse cx="444" cy="238" rx="10" ry="10" fill="#4ade80" stroke="#fff" stroke-width="2"/>
  <ellipse cx="586" cy="228" rx="10" ry="10" fill="#4ade80" stroke="#fff" stroke-width="2"/>
  <ellipse cx="586" cy="248" rx="10" ry="10" fill="#f87171" stroke="#fff" stroke-width="2"/>

  <!-- Connection lines -->
  <line x1="406" y1="178" x2="444" y2="158" stroke="#fff" stroke-width="2"/>
  <line x1="586" y1="158" x2="620" y2="158" stroke="#fff" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="444" y1="238" x2="415" y2="238" stroke="#fff" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Port labels -->
  <text x="597" y="153" font-size="7" fill="#60a5fa">default</text>
  <text x="597" y="224" font-size="7" fill="#4ade80">continue</text>
  <text x="597" y="246" font-size="7" fill="#f87171">exit</text>

  <!-- Canvas annotation -->
  <rect x="620" y="140" width="200" height="100" rx="4" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="720" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8">포트 색상 규칙</text>
  <ellipse cx="638" cy="178" rx="8" ry="8" fill="#4ade80"/>
  <text x="652" y="182" font-size="8" fill="#d1d5db">입력 포트</text>
  <ellipse cx="638" cy="198" rx="8" ry="8" fill="#60a5fa"/>
  <text x="652" y="202" font-size="8" fill="#d1d5db">default 출력</text>
  <ellipse cx="638" cy="218" rx="8" ry="8" fill="#4ade80" stroke="#fff" stroke-width="1"/>
  <text x="652" y="222" font-size="8" fill="#d1d5db">true / continue</text>
  <ellipse cx="720" cy="178" rx="8" ry="8" fill="#f87171"/>
  <text x="734" y="182" font-size="8" fill="#d1d5db">false / exit</text>
  <ellipse cx="720" cy="198" rx="8" ry="8" fill="#f59e0b"/>
  <text x="734" y="202" font-size="8" fill="#d1d5db">Condition 노드</text>
  <ellipse cx="720" cy="218" rx="8" ry="8" fill="#8b5cf6"/>
  <text x="734" y="222" font-size="8" fill="#d1d5db">Loop 노드</text>

  <!-- Right Panel - Log -->
  <rect x="234" y="382" width="604" height="96" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="247" y="398" font-size="9" fill="#6b7280">LogListBox</text>
  <text x="247" y="414" font-size="8" fill="#4ade80">[14:30:22] Root node created.</text>
  <text x="247" y="428" font-size="8" fill="#4ade80">[14:30:35] Node added: SendPacketNode</text>
  <text x="247" y="442" font-size="8" fill="#fbbf24">[14:30:40] SendPacketNode configured: Ping</text>
  <text x="247" y="456" font-size="8" fill="#60a5fa">[14:30:55] Connected OnConnected → SendPacketNode</text>
  <text x="247" y="470" font-size="8" fill="#34d399">[14:31:10] Graph built successfully with 3 nodes</text>

  <!-- Interaction callouts -->
  <text x="336" y="120" text-anchor="middle" font-size="8" fill="#f59e0b">더블클릭 → 설정 다이얼로그</text>
  <text x="336" y="250" text-anchor="middle" font-size="8" fill="#f59e0b">Delete 키 → 노드 삭제</text>
  <text x="336" y="263" text-anchor="middle" font-size="8" fill="#f59e0b">드래그 → 이동</text>
</svg>
